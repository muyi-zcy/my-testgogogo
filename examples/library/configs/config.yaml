# 主配置
active: local

test:
  skip_integration: false

auth:
  # 使用框架内置 login Provider（YAML 配置，无需写代码）
  provider: login
  cache_enabled: true
  cache_dir: .cache/auth
  cache_ttl_hours: 168
  login:
    url: /api/auth/login
    method: POST
    without_auth: true
    body:
      username: "{{user.username}}"
      password: "{{user.password}}"
    token_path: token
    validate:
      url: /api/auth/me
      method: GET

report:
  enabled: true
  base_dir: reports

load:
  enabled: true
  output_dir: reports/load
  defaults:
    duration: 10s
    rate: 20
    concurrency: 5
    warmup: 2s
    timeout: 15s
  scenarios:
    - name: book-list
      type: api
      enabled: true
    - name: book-query-has-data
      type: flow
      enabled: false
    - name: book-query-empty
      type: flow
      enabled: false
